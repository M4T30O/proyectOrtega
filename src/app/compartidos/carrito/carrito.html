<h1 class="tituloP">Carrito de Compras</h1>

@if(productosEnCarrito.length === 0){
<p style="display: flex; justify-content: center;">No hay productos en el carrito</p>
}

@else {
<table class="table">
    <thead>
        <tr>
            <th scope="col">Producto</th>
            <th scope="col">Nombre</th>
            <th scope="col">Descripcion</th>
            <th scope="col">Precio</th>
        </tr>
    </thead>

    <tbody>
        @for (p of productosEnCarrito;track p.id) {
        <tr>
            <th class="row"></th>
            <div>
                <td><img src="{{p.img}}" alt=""></td>
            </div>
            <td>{{p.nombre}}</td>
            <td>{{p.descripcion}}</td>
            <td>${{p.precio*p.cant}}</td>
            <td>
                <button class="btn" (click)="disminuir(p.id)">-</button>
                <button class="btn" (click)="aumentar(p.id)">+</button>
            </td>
            <td>{{p.cant}}</td>
            <td>
                <button class="btn" (click)="eliminarLibro(p.id)">Eliminar</button>
            </td>
        </tr>

        }

    </tbody>


</table>

<div class="container">
    <button class="btn btn-primary" (click)="comprar()">Finalizar Compra</button>
    <button class="btn btn-danger bi bi-trash3" (click)="eliminarTodo()"></button>
</div>
}
