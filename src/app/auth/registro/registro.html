<form class="formulario">
    <div class="mb-3">
        <label for="exampleInputEmail1" class="form-label">Email</label>
        <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="ej: emailejemplo@gmail.com">
        <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
    </div>
    <div class="mb-3">
        <label for="">Nombre de usuario</label>
        <input type="text" class="form-control" placeholder="ej: perejil34">
    </div>
    <div class="mb-3">
        <label for="exampleInputPassword1" class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="exampleInputPassword1" placeholder = "ej: 1234">
    </div>
    <div class="mb-3">
        <label for="exampleInputPassword1" class="form-label">Vuelva a ingresar su contraseña</label>
        <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Ingrese de nuevo su contraseña">
    </div>
    <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="exampleCheck1">
        <label class="form-check-label" for="exampleCheck1">Acepto los terminos de privacidad</label>
    </div>
    <button type="submit" class="btn btn-primary">Registrarse</button>
</form>
