<div class="container mt-4">

  <div class="carruselContainer">
    <div id="carouselExampleFade" class="carousel slide carousel-fade">
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="..." class="d-block w-100" alt="...">
        </div>
        <div class="carousel-item">
          <img src="..." class="d-block w-100" alt="...">
        </div>
        <div class="carousel-item">
          <img src="..." class="d-block w-100" alt="...">
        </div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleFade" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleFade" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>
    
  </div>



  <h2 class="text-center mb-4 text-uppercase fw-bold text-danger">🔥 Ofertas Imperdibles 🔥</h2>

  @if (productosOferta.length === 0) {
  <p class="text-center text-muted fs-5">No hay productos en oferta actualmente.</p>
  } @else {
  <div class="row row-cols-1 row-cols-md-3 g-4">
    @for (p of productosOferta; track p.id) {
    @if (p.disponibilidad) {
    <div class="col">
      <div class="card h-100 shadow-sm position-relative">

        <span class="position-absolute top-0 start-0 m-2 badge bg-danger text-uppercase">Oferta</span>

        <div class="card-img-container">
          <img [src]="p.img" class="card-img-top" alt="Portada de {{p.nombre}}">
        </div>

        <div class="card-body d-flex flex-column">
          <h5 class="card-title fw-bold text-truncate">{{p.nombre}}</h5>
          <p class="card-text text-muted mb-1">{{p.escritor}}</p>
          <p class="card-text text-success fs-5 fw-bold mb-3">${{p.precio}}</p>

          <div class="mt-auto d-flex flex-column gap-2">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <button class="btn btn-outline-secondary btn-sm" style="width: 75%;"
                (click)="verInformacion(p.nombre, p.escritor, p.genero, p.descripcion)"> Info </button>

              @if (p.favorito) {
              <i class="bi bi-heart fs-4 text-danger c-pointer" (click)="agregarFavorito(p)"></i>
              } @else {
              <i class="bi bi-heart-fill fs-4 text-danger c-pointer" (click)="eliminarFavorito(p)"></i>
              }
            </div>

            <button class="btn btn-primary w-100 fw-semibold" (click)="agregarCarrito(p)">
              🛒 Agregar al carrito
            </button>
          </div>
        </div>

      </div>
    </div>
    }
    }
  </div>
  }
</div>
